services:
  - type: web
    name: orbitflow
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    disk:
      name: orbitflow-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: XLSX_PATH
        value: /var/data/OrbitFlow_PM_Tracker_v3.xlsx
